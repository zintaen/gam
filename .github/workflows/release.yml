---
name: 🚀 CI - Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-24.04'
            args: ''
            rust_target: ''
          - platform: 'windows-latest'
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          fetch-depth: 0

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061  # v4.2.0
        with:
          version: 10.29.3

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: "24.12.0"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Extract version
        id: version
        run: echo "number=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@a34a8009a9588bb86b02a873cf592440e96a5da8  # v6.1.1
        with:
          configuration: ".github/changelog-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa  # v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'GAM ${{ github.ref_name }}'
          releaseBody: |
            ### 📥 Download

            | Platform | Architecture | File |
            |----------|-------------|------|
            | 🍎 macOS | Apple Silicon (M1/M2/M3/M4) | [`GAM_${{ steps.version.outputs.number }}_aarch64.dmg`](https://github.com/zintaen/gam/releases/download/${{ github.ref_name }}/GAM_${{ steps.version.outputs.number }}_aarch64.dmg) |
            | 🍎 macOS | Intel | [`GAM_${{ steps.version.outputs.number }}_x64.dmg`](https://github.com/zintaen/gam/releases/download/${{ github.ref_name }}/GAM_${{ steps.version.outputs.number }}_x64.dmg) |
            | 🪟 Windows | x64 (Installer) | [`GAM_${{ steps.version.outputs.number }}_x64-setup.exe`](https://github.com/zintaen/gam/releases/download/${{ github.ref_name }}/GAM_${{ steps.version.outputs.number }}_x64-setup.exe) |
            | 🪟 Windows | x64 (MSI) | [`GAM_${{ steps.version.outputs.number }}_x64_en-US.msi`](https://github.com/zintaen/gam/releases/download/${{ github.ref_name }}/GAM_${{ steps.version.outputs.number }}_x64_en-US.msi) |
            | 🐧 Linux | x64 (Debian/Ubuntu) | [`GAM_${{ steps.version.outputs.number }}_amd64.deb`](https://github.com/zintaen/gam/releases/download/${{ github.ref_name }}/GAM_${{ steps.version.outputs.number }}_amd64.deb) |
            | 🐧 Linux | x64 (Fedora/RHEL) | [`GAM-${{ steps.version.outputs.number }}-1.x86_64.rpm`](https://github.com/zintaen/gam/releases/download/${{ github.ref_name }}/GAM-${{ steps.version.outputs.number }}-1.x86_64.rpm) |
            | 🐧 Linux | x64 (AppImage) | [`GAM_${{ steps.version.outputs.number }}_amd64.AppImage`](https://github.com/zintaen/gam/releases/download/${{ github.ref_name }}/GAM_${{ steps.version.outputs.number }}_amd64.AppImage) |

            > **Note:** `.sig` and `.tar.gz` files are used for auto-update verification. You can safely ignore them.

            ---

            ### 📝 What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ---

            ### 🍺 macOS (Homebrew)

            ```bash
            brew install --cask zintaen/tap/gam
            ```
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  homebrew:
    name: 🍺 Bump Homebrew Cask
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract version
        id: version
        run: echo "number=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          repository: zintaen/homebrew-tap
          token: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}

      - name: Wait for release assets to propagate
        run: sleep 30

      - name: Compute SHA256 of DMG
        id: sha
        run: |
          DMG_URL="https://github.com/zintaen/gam/releases/download/${{ github.ref_name }}/GAM_${{ steps.version.outputs.number }}_aarch64.dmg"
          echo "Downloading ${DMG_URL}..."
          SHA=$(curl -sL --fail --retry 5 --retry-delay 10 "${DMG_URL}" | sha256sum | awk '{print $1}')

          EMPTY_HASH="e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
          if [ -z "${SHA}" ] || [ "${SHA}" = "${EMPTY_HASH}" ]; then
            echo "::error::SHA256 is empty or matches zero-length file. Asset may not be available."
            exit 1
          fi

          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Update Cask file
        run: |
          CASK_FILE="Casks/gam.rb"
          VERSION="${{ steps.version.outputs.number }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "${CASK_FILE}"
          sed -i "s/sha256 \".*\"/sha256 \"${SHA}\"/" "${CASK_FILE}"

          echo "Updated ${CASK_FILE} to version ${VERSION} with sha256 ${SHA}"
          cat "${CASK_FILE}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/gam.rb
          git commit -m "brew: update gam to ${{ github.ref_name }}"
          git push
